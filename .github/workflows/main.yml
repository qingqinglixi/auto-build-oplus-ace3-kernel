name: Build OnePlus Kernel

on:
  workflow_dispatch:  # 允许手动触发
  # push:             # 可按需开启，例如推送到特定分支时自动构建

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用较稳定的 Ubuntu 版本
    timeout-minutes: 360    # 内核编译可能耗时较长，设置 6 小时超时

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex git gnupg gperf libelf-dev \
            libssl-dev libtinfo5 libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev repo

      - name: Configure Git (repo required)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Initialize repo manifest
        run: |
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b oneplus/sm8550 \
            -m oneplus_ace3_b.xml

      - name: Sync kernel source
        run: |
          repo sync -c --no-tags --no-clone-bundle -j$(nproc) --force-sync

      - name: Build kernel
        run: |
          ./kernel_platform/oplus/build/oplus_build_kernel.sh

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: |
            out/*.img
            out/*.ko
            # 根据实际编译输出路径修改，常见为 out/arch/arm64/boot/Image
