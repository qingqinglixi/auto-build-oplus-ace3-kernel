name: Build OnePlus Kernel (Ace 3)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison bc build-essential \
          zip curl zstd libc6-dev libncurses5-dev xz-utils libssl-dev \
          libelf-dev cpio python3 python2 gcc-aarch64-linux-gnu

    - name: Install repo tool
      run: |
        mkdir -p ~/.local/bin
        curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ~/.local/bin/repo
        chmod a+x ~/.local/bin/repo
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Cache repo manifest & objects
      uses: actions/cache@v3
      with:
        path: |
          ~/.repo
          kernel_workspace/.repo
        key: repo-cache-${{ github.run_id }}
        restore-keys: repo-cache-

    - name: Initialize repo manifest
      run: |
        mkdir -p kernel_workspace
        cd kernel_workspace
        repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
          -b oneplus/sm8550 -m oneplus_ace3_b.xml --depth=1

    - name: Sync kernel source
      run: |
        cd kernel_workspace
        repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc)

    - name: Build kernel
      run: |
        cd kernel_workspace
        export PATH=$PATH:$HOME/.local/bin
        export CROSS_COMPILE=aarch64-linux-gnu-
        export USE_CCACHE=1
        export CCACHE_DIR=${{ github.workspace }}/.ccache
        ./kernel_platform/oplus/build/oplus_build_kernel.sh pineapple gki

    - name: Upload kernel images
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: |
          kernel_workspace/out/**/*.img
          kernel_workspace/out/**/*.ko
          kernel_workspace/out/**/Image.gz
        if-no-files-found: warn
