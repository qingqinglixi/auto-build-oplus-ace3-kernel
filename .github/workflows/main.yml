name: Build OnePlus Kernel (Ace 3)

on:
  workflow_dispatch:      # 手动触发
  schedule:               # 可选：定时构建
    - cron: '0 0 * * 0'   # 每周一次

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360  # 内核编译耗时较长，延长超时

    steps:
    - name: Checkout (dummy, for workspace)
      run: echo "Starting kernel build"

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison bc build-essential \
          zip curl zstd libc6-dev libncurses5-dev xz-utils libssl-dev \
          libelf-dev cpio python3 python2

    - name: Install repo tool
      run: |
        mkdir -p ~/.local/bin
        curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ~/.local/bin/repo
        chmod a+x ~/.local/bin/repo
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Cache repo manifest & objects
      uses: actions/cache@v3
      with:
        path: |
          ~/.repo
          kernel_workspace/.repo
        key: repo-cache-${{ hashFiles('manifest.xml') }}
        restore-keys: repo-cache-

    - name: Initialize repo manifest
      run: |
        mkdir -p kernel_workspace
        cd kernel_workspace
        repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
          -b oneplus/sm8550 -m oneplus_ace3_b.xml --depth=1

    - name: Sync kernel source
      run: |
        cd kernel_workspace
        repo sync -c --force-sync --no-tags --no-clone-bundle -j$(nproc)

    - name: Build kernel
      run: |
        cd kernel_workspace
        # 设置环境变量（如果脚本需要）
        export PATH=$PATH:$HOME/.local/bin
        export CROSS_COMPILE=aarch64-linux-gnu-
        # 执行构建脚本
        ./kernel_platform/oplus/build/oplus_build_kernel.sh pineapple gki
      env:
        # 根据实际需要添加其他环境变量，例如 ccache
        USE_CCACHE: 1
        CCACHE_DIR: ${{ github.workspace }}/.ccache

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: kernel-images
        path: |
          kernel_workspace/out/**/*.img
          kernel_workspace/out/**/*.ko
          kernel_workspace/out/**/Image.gz
